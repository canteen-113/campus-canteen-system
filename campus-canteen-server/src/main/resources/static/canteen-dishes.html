<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>菜品管理</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.hidden{display:none}
.modal-box{background:#fff;border-radius:24px;width:640px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);padding:28px}
.modal-box h3{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:20px}
.modal-box label{display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase}
.modal-box input,.modal-box select{width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;outline:none;margin-bottom:14px;box-sizing:border-box}
.modal-box input:focus,.modal-box select:focus{border-color:#2563eb}
.frow{display:flex;gap:12px}.frow>*{flex:1}
.btn-row{display:flex;justify-content:flex-end;gap:12px;margin-top:8px}
.btn-cancel{background:#f1f5f9;color:#475569;border:none;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.btn-save{background:#2563eb;color:#fff;border:none;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,.2)}
img.preview{width:100px;height:75px;border-radius:12px;object-fit:cover;border:2px solid #e2e8f0;margin-top:22px}
</style>
</head>
<body class="bg-slate-100 min-h-screen flex text-slate-800">
<aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0">
<div class="p-6 flex items-center gap-3">
<div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><iconify-icon class="text-white text-xl" icon="mdi:silverware-fork-knife"></iconify-icon></div>
<span class="text-white font-bold tracking-tight">智慧食堂 · 管理端</span>
</div>
<nav class="flex-1 px-4 py-4 space-y-1">
<a class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl transition-all" href="canteen-index.html"><iconify-icon class="text-xl" icon="mdi:view-dashboard"></iconify-icon><span class="text-sm font-medium">首页概览</span></a>
<div class="text-xs font-semibold text-slate-500 uppercase px-4 py-3 mt-4">业务管理</div>
<a class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-xl transition-all" href="canteen-dishes.html"><iconify-icon class="text-xl" icon="mdi:food-variant"></iconify-icon><span class="text-sm font-medium">菜品管理</span></a>
<a class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl transition-all" href="canteen-stock.html"><iconify-icon class="text-xl" icon="mdi:box-variant"></iconify-icon><span class="text-sm font-medium">食材库存</span></a>
<a class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl transition-all" href="canteen-verify.html"><iconify-icon class="text-xl" icon="mdi:barcode-scan"></iconify-icon><span class="text-sm font-medium">取餐核销</span></a>
<a class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl transition-all" href="canteen-feedback.html"><iconify-icon class="text-xl" icon="mdi:comment-quote"></iconify-icon><span class="text-sm font-medium">评价管理</span></a>
<div class="text-xs font-semibold text-slate-500 uppercase px-4 py-3 mt-4">运营支撑</div>
<a class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl transition-all" href="canteen-purchase.html"><iconify-icon class="text-xl" icon="mdi:cart-arrow-down"></iconify-icon><span class="text-sm font-medium">采购审批</span></a>
<a class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl transition-all" href="canteen-safety.html"><iconify-icon class="text-xl" icon="mdi:shield-check"></iconify-icon><span class="text-sm font-medium">食品安全</span></a>
<a class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-xl transition-all" href="canteen-staff-live"><iconify-icon class="text-xl" icon="mdi:account-group"></iconify-icon><span class="text-sm font-medium">员工管理</span></a>
</nav>
<div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">v3.5.0</div>
</aside>
<main class="flex-1 flex flex-col min-w-0">
<header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between">
<h2 class="text-lg font-bold">菜品库管理</h2>
<button id="addDishBtn" class="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold shadow-lg shadow-slate-200"><iconify-icon icon="mdi:plus"></iconify-icon>新增菜品</button>
</header>
<div class="flex-1 overflow-y-auto p-8 space-y-6">
<div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-wrap gap-4 items-end">
<div class="space-y-1 flex-1 min-w-[200px]"><label class="text-xs font-bold text-slate-400">菜品名称/编号</label><input id="searchKeyword" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2.5 text-sm outline-none" placeholder="请输入关键字..." type="text"/></div>
<div class="space-y-1 w-40"><label class="text-xs font-bold text-slate-400">所属分类</label><select id="categoryFilter" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2.5 text-sm outline-none"><option value="">全部</option></select></div>
<div class="space-y-1 w-40"><label class="text-xs font-bold text-slate-400">上下架状态</label><select id="statusFilter" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2.5 text-sm outline-none"><option value="">全部</option><option value="ON">已上架</option><option value="OFF">已下架</option></select></div>
<button id="searchBtn" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold">查询</button>
<button id="resetBtn" class="px-6 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold">重置</button>
</div>
<div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
<table class="w-full text-left">
<thead class="bg-slate-50 border-b border-slate-100">
<tr><th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">菜品信息</th><th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">分类</th><th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">单价</th><th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">营养/热量</th><th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">库存/销量</th><th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">状态</th><th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">操作</th></tr>
</thead>
<tbody class="divide-y divide-slate-50" id="dishTableBody"><tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">加载中...</td></tr></tbody>
</table>
<div class="px-8 py-4 bg-slate-50 flex justify-between items-center text-xs text-slate-500">
<span id="paginationInfo">--</span>
<div id="paginationBtns" class="flex gap-2"></div>
</div>
</div>
</div>
</main>

<div class="modal-overlay hidden" id="dishModal"><div class="modal-box">
<h3 id="modalTitle">编辑菜品</h3>
<input type="hidden" id="editId">
<div class="frow"><div><label>菜品名称 *</label><input id="editName"></div><div><label>菜品编号</label><input id="editDishNo"></div></div>
<div class="frow"><div><label>所属分类</label><select id="editCategory"></select></div><div><label>单价</label><input id="editPrice" type="number" step="0.01"></div></div>
<div class="frow"><div><label>每日库存</label><input id="editStock" type="number"></div><div><label>热量(kcal)</label><input id="editCalories" type="number"></div></div>
<div class="frow"><div><label>营养标签</label><input id="editTags" placeholder="高蛋白,低脂肪"></div><div><label>推荐</label><select id="editRecommended"><option value="0">否</option><option value="1">是</option></select></div></div>
<div class="frow"><div><label>状态</label><select id="editStatus"><option value="ON">上架</option><option value="OFF">下架</option></select></div><div><label>描述</label><input id="editDesc"></div></div>
<div class="frow"><div><label>图片URL</label><input id="editImage" oninput="document.getElementById('editImagePreview').src=this.value||''"></div><div><img id="editImagePreview" class="preview" src=""></div></div>
<div class="btn-row"><button class="btn-cancel" onclick="document.getElementById('dishModal').classList.add('hidden')">取消</button><button class="btn-save" onclick="saveDish()">保存</button></div>
</div></div>

<script>
var API_BASE='http://localhost:8080/api';
var currentPage=1,pageSize=10,categories=[];

// 加载分类下拉
fetch(API_BASE+'/dishes/categories').then(function(r){return r.json()}).then(function(res){
  if(res.code===200&&res.data){
    categories=res.data;
    var sel=document.getElementById('categoryFilter');
    sel.innerHTML='<option value="">全部</option>';
    var esel=document.getElementById('editCategory');
    if(esel)esel.innerHTML='<option value="">请选择</option>';
    categories.forEach(function(c){
      sel.innerHTML+='<option value="'+c.id+'">'+c.name+'</option>';
      if(esel)esel.innerHTML+='<option value="'+c.id+'">'+c.name+'</option>';
    });
  }
}).catch(function(){});

// 加载菜品列表
function loadDishes(page){
  page=page||currentPage;
  var kw=document.getElementById('searchKeyword').value.trim();
  var cid=document.getElementById('categoryFilter').value;
  var st=document.getElementById('statusFilter').value;
  var url=API_BASE+'/dishes?page='+page+'&size='+pageSize;
  if(kw)url+='&keyword='+encodeURIComponent(kw);
  if(cid)url+='&categoryId='+encodeURIComponent(cid);
  if(st)url+='&status='+encodeURIComponent(st);
  fetch(url).then(function(r){return r.json()}).then(function(res){
    if(res.code===200&&res.data){
      currentPage=res.data.page;
      var list=res.data.list||[];
      var tb=document.getElementById('dishTableBody');
      if(!list.length){tb.innerHTML='<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">暂无菜品数据</td></tr>';}
      else{
        var h='';
        for(var i=0;i<list.length;i++){
          var d=list[i];
          var isOn=(d.status==='ON'||d.status==='已上架');
          var stHtml=isOn?'<span class="flex items-center gap-1.5 text-xs text-emerald-600 font-bold"><span class="w-2 h-2 bg-emerald-500 rounded-full"></span>已上架</span>':'<span class="flex items-center gap-1.5 text-xs text-slate-400 font-bold"><span class="w-2 h-2 bg-slate-400 rounded-full"></span>已下架</span>';
          h+='<tr class="hover:bg-slate-50 transition-all"><td class="px-6 py-4"><div class="flex items-center gap-3"><img alt="" class="w-12 h-12 rounded-xl object-cover" src="'+(d.image||'')+'"/><div><p class="text-sm font-bold">'+(d.name||'')+'</p><p class="text-[10px] text-slate-400">ID: '+(d.dishNo||d.id||'')+'</p></div></div></td><td class="px-6 py-4"><span class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded">'+(d.categoryName||'')+'</span></td><td class="px-6 py-4 text-sm font-black">'+(Number(d.price||0).toFixed(2))+'</td><td class="px-6 py-4"><div class="flex gap-1"><span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">'+(d.calories||'')+'kcal</span></div></td><td class="px-6 py-4"><p class="text-xs font-medium">库存:'+(d.dailyStock!==undefined?d.dailyStock:(d.stock||0))+' | 售出:'+(d.totalSold||0)+'</p></td><td class="px-6 py-4">'+stHtml+'</td><td class="px-6 py-4"><div class="flex gap-2"><button class="p-2 hover:bg-white hover:shadow-sm rounded-lg text-slate-400 hover:text-blue-600 transition-all" onclick="editDish('+d.id+')"><iconify-icon icon="mdi:pencil-outline"></iconify-icon></button><button class="p-2 hover:bg-white hover:shadow-sm rounded-lg text-slate-400 hover:text-orange-600 transition-all" onclick="toggleDish('+d.id+')"><iconify-icon icon="mdi:eye-off-outline"></iconify-icon></button><button class="p-2 hover:bg-white hover:shadow-sm rounded-lg text-slate-400 hover:text-red-600 transition-all" onclick="deleteDish('+d.id+')"><iconify-icon icon="mdi:trash-can-outline"></iconify-icon></button></div></td></tr>';
        }
        tb.innerHTML=h;
      }
      document.getElementById('paginationInfo').textContent='第'+((res.data.page-1)*res.data.size+1)+'-'+Math.min(res.data.page*res.data.size,res.data.total)+'条，共'+res.data.total+'条';
      var pb=document.getElementById('paginationBtns'),ph='';
      for(var i=1;i<=res.data.totalPages;i++){ph+='<button class="w-8 h-8 flex items-center justify-center rounded-lg transition-all'+(i===res.data.page?' bg-white border border-slate-200':' hover:bg-white')+'" onclick="loadDishes('+i+')">'+i+'</button>';}
      pb.innerHTML=ph;
    }
  }).catch(function(){});
}
loadDishes(1);

// 编辑
function editDish(id){
  fetch(API_BASE+'/dishes/'+id).then(function(r){return r.json()}).then(function(res){
    if(res.code!==200||!res.data){alert('加载失败');return;}
    var d=res.data;
    document.getElementById('editId').value=d.id||'';
    document.getElementById('editName').value=d.name||'';
    document.getElementById('editDishNo').value=d.dishNo||'';
    document.getElementById('editPrice').value=d.price||'';
    document.getElementById('editStock').value=d.dailyStock!==undefined?d.dailyStock:0;
    document.getElementById('editCalories').value=d.calories||'';
    document.getElementById('editTags').value=d.nutritionTags||'';
    document.getElementById('editDesc').value=d.description||'';
    document.getElementById('editImage').value=d.image||'';
    document.getElementById('editRecommended').value=d.isRecommended||0;
    document.getElementById('editStatus').value=d.status||'ON';
    document.getElementById('editImagePreview').src=d.image||'';
    document.getElementById('modalTitle').textContent='编辑菜品 - '+(d.name||'');
    var esel=document.getElementById('editCategory');
    esel.innerHTML='<option value="">请选择</option>';
    categories.forEach(function(c){esel.innerHTML+='<option value="'+c.id+'"'+(c.id===d.categoryId?' selected':'')+'>'+c.name+'</option>';});
    document.getElementById('dishModal').classList.remove('hidden');
  }).catch(function(){alert('加载失败');});
}

// 新增
document.getElementById('addDishBtn').onclick=function(){
  document.getElementById('editId').value='';
  document.getElementById('editName').value='';document.getElementById('editDishNo').value='';
  document.getElementById('editPrice').value='';document.getElementById('editStock').value='';
  document.getElementById('editCalories').value='';document.getElementById('editTags').value='';
  document.getElementById('editDesc').value='';document.getElementById('editImage').value='';
  document.getElementById('editRecommended').value='0';document.getElementById('editStatus').value='ON';
  document.getElementById('editImagePreview').src='';
  document.getElementById('modalTitle').textContent='新增菜品';
  var esel=document.getElementById('editCategory');
  esel.innerHTML='<option value="">请选择</option>';
  categories.forEach(function(c){esel.innerHTML+='<option value="'+c.id+'">'+c.name+'</option>';});
  document.getElementById('dishModal').classList.remove('hidden');
};

// 保存
function saveDish(){
  var id=document.getElementById('editId').value;
  var data={
    name:document.getElementById('editName').value,
    dishNo:document.getElementById('editDishNo').value,
    categoryId:parseInt(document.getElementById('editCategory').value)||null,
    price:parseFloat(document.getElementById('editPrice').value)||0,
    dailyStock:parseInt(document.getElementById('editStock').value)||0,
    calories:parseInt(document.getElementById('editCalories').value)||null,
    nutritionTags:document.getElementById('editTags').value,
    description:document.getElementById('editDesc').value,
    image:document.getElementById('editImage').value,
    isRecommended:parseInt(document.getElementById('editRecommended').value)||0,
    status:document.getElementById('editStatus').value
  };
  if(!data.name){alert('请输入菜品名称');return;}
  var isNew=!id;
  fetch(API_BASE+'/dishes'+(isNew?'':'/'+id),{method:isNew?'POST':'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
  .then(function(r){return r.json()})
  .then(function(res){
    if(res.code===200){alert(isNew?'添加成功':'修改成功');document.getElementById('dishModal').classList.add('hidden');loadDishes(currentPage);}
    else alert(res.message||'保存失败');
  }).catch(function(){alert('网络错误');});
}

// 删除
function deleteDish(id){
  if(!confirm('确定删除此菜品？'))return;
  fetch(API_BASE+'/dishes/'+id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){
    if(res.code===200){alert('已删除');loadDishes(currentPage);}
    else alert(res.message||'删除失败');
  }).catch(function(){alert('网络错误');});
}

// 上下架
function toggleDish(id){
  fetch(API_BASE+'/dishes/'+id+'/status',{method:'PUT'}).then(function(r){return r.json()}).then(function(res){
    if(res.code===200){loadDishes(currentPage);}
    else alert(res.message||'操作失败');
  }).catch(function(){alert('网络错误');});
}

document.getElementById('searchBtn').onclick=function(){loadDishes(1);};
document.getElementById('resetBtn').onclick=function(){
  document.getElementById('searchKeyword').value='';
  document.getElementById('categoryFilter').value='';
  document.getElementById('statusFilter').value='';
  loadDishes(1);
};
</script>
</body>
</html>
