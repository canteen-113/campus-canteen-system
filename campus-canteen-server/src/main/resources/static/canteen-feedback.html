<style>
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-box{background:#fff;border-radius:24px;width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);padding:28px}
.modal-box h3{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:20px}
.modal-box textarea{width:100%;min-height:120px;padding:12px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;outline:none;margin-bottom:16px;box-sizing:border-box}
.modal-box textarea:focus{border-color:#2563eb}
.btn-row{display:flex;justify-content:flex-end;gap:12px}
.btn-cancel{background:#f1f5f9;color:#475569;border:none;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.btn-save{background:#2563eb;color:#fff;border:none;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
</style>
<div class="modal-overlay hidden" id="replyModal"><div class="modal-box"><h3 id="replyTitle">回复评价</h3><textarea id="replyContent" placeholder="输入回复内容..."></textarea><div class="btn-row"><button class="btn-cancel" onclick="document.getElementById('replyModal').classList.add('hidden')">取消</button><button class="btn-save" onclick="doReply()">提交回复</button></div></div></div>
<script src="api-helper.js"></script>
<script>
var replyId=null;
var API_BASE='http://localhost:8080/api';
function loadFeedbacks(filter){
  var url=API_BASE+'/feedbacks?page=1&size=50';
  fetch(url).then(function(r){return r.json()}).then(function(r){
    if(r.code===200&&r.data){
      var list=r.data.list||r.data.content||r.data.records||[];
      var div=document.getElementById('feedbackList');
      if(!list.length){div.innerHTML='<p class="text-center text-slate-400 py-12">暂无评价</p>';return;}
      var h='';
      for(var i=0;i<list.length;i++){
        var f=list[i];
        var stars='';for(var j=0;j<5;j++){stars+='<iconify-icon class="'+(j<f.rating?'text-amber-400':'text-slate-200')+' text-xs" icon="'+(j<f.rating?'mdi:star':'mdi:star-outline')+'"></iconify-icon>';}
        var isBad=f.rating<=2;
        h+='<div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><div class="flex justify-between items-start"><div class="flex items-center gap-4"><div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400"><iconify-icon class="text-2xl" icon="mdi:account"></iconify-icon></div><div><p class="text-sm font-bold">'+(f.isAnonymous?'匿名用户':(f.userName||'用户'))+'</p><div class="flex gap-1 mt-0.5">'+stars+'</div></div></div><span class="text-xs text-slate-400">'+(f.createTime||'')+'</span></div><div class="pl-16"><p class="text-sm '+(isBad?'text-red-600 font-bold':'text-slate-700')+' leading-relaxed">'+(f.content||'')+'</p>';
        if(f.reply){h+='<div class="mt-4 p-4 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-xs font-bold text-blue-600 mb-1">官方回复：</p><p class="text-xs text-slate-500">'+f.reply+'</p></div>';}
        else{h+='<div class="mt-4 flex gap-3"><button class="px-4 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold" onclick="openReply('+f.id+',\''+(f.userName||'用户')+'\')">回复反馈</button></div>';}
        h+='</div></div>';
      }
      div.innerHTML=h;
    }
  }).catch(function(){});
}
function openReply(id,userName){
  replyId=id;document.getElementById('replyTitle').textContent='回复 '+userName+' 的评价';
  document.getElementById('replyContent').value='';document.getElementById('replyModal').classList.remove('hidden');
}
function doReply(){
  var content=document.getElementById('replyContent').value.trim();
  if(!content){alert('请输入回复内容');return;}
  fetch(API_BASE+'/feedbacks/'+replyId+'/reply?reply='+encodeURIComponent(content),{method:'PUT'})
  .then(function(r){return r.json()}).then(function(r){
    if(r.code===200){alert('回复成功');document.getElementById('replyModal').classList.add('hidden');loadFeedbacks();}
    else alert(r.message||'回复失败');
  }).catch(function(){alert('回复失败');});
}
// Filter buttons
document.querySelectorAll('.flex.gap-2 button').forEach(function(btn,i){
  btn.onclick=function(){loadFeedbacks(i===0?'all':'bad');};
});
document.addEventListener('DOMContentLoaded',function(){loadFeedbacks();});
</script>
