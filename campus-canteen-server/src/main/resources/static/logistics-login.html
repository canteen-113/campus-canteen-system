<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>后勤监管登录 - 校园智慧食堂</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 relative overflow-hidden font-sans">
<!-- 背景装饰 -->
<div class="absolute inset-0 z-0 overflow-hidden">
<div class="absolute -top-[10%] -right-[10%] w-[50%] h-[50%] bg-indigo-50 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[0%] left-[0%] w-[40%] h-[40%] bg-blue-50 rounded-full blur-[100px]"></div>
</div>
<div class="w-full max-w-md bg-white rounded-[40px] shadow-2xl border border-slate-100 p-12 relative z-10">
<div class="text-center mb-10">
<div class="w-16 h-16 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-200">
<iconify-icon class="text-white text-3xl" icon="mdi:shield-lock"></iconify-icon>
</div>
<h1 class="text-2xl font-black text-slate-900 tracking-tight">后勤处监管大厅</h1>
<p class="text-slate-400 text-sm mt-2 font-medium">Logistics Supervision Terminal</p>
</div>
<form id="loginForm" class="space-y-6" onsubmit="return false;">
<div class="space-y-1.5">
<label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Supervisor Account</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-300 group-focus-within:text-indigo-600 transition-colors">
<iconify-icon icon="mdi:security-account-outline"></iconify-icon>
</span>
<input id="username" class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:border-indigo-600 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all text-sm font-bold" placeholder="监管员账号" type="text" value="admin_supervisor_01"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Secure Passkey</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-300 group-focus-within:text-indigo-600 transition-colors">
<iconify-icon icon="mdi:lock-check-outline"></iconify-icon>
</span>
<input id="password" class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:border-indigo-600 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all text-sm font-bold" placeholder="访问安全口令" type="password" value="123456"/>
</div>
</div>
<div class="flex items-center justify-between px-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input checked="" class="w-4 h-4 rounded text-indigo-600 border-slate-200 focus:ring-indigo-500" type="checkbox"/>
<span class="text-xs text-slate-500 group-hover:text-slate-700 transition-colors">验证双重身份鉴权</span>
</label>
<a class="text-xs text-indigo-600 font-bold hover:underline" href="#">安全中心</a>
</div>
<button type="button" onclick="doLogin()" class="block w-full bg-indigo-600 text-white text-center py-5 rounded-2xl font-black text-sm shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-[0.98]">
                进入监管工作台
            </button>
</form>
<div class="mt-12">
<div class="relative flex items-center mb-8">
<div class="flex-grow border-t border-slate-100"></div>
<span class="flex-shrink mx-4 text-[10px] text-slate-300 font-black uppercase tracking-widest">Switch Role</span>
<div class="flex-grow border-t border-slate-100"></div>
</div>
<div class="flex justify-center">
<a class="flex items-center justify-center gap-2 p-3 bg-slate-50 rounded-xl hover:bg-emerald-50 transition-all border border-transparent hover:border-emerald-100 px-8" href="canteen-login.html">
<iconify-icon class="text-slate-400 text-lg" icon="mdi:store-cog-outline"></iconify-icon>
<span class="text-[11px] font-bold text-slate-500 uppercase tracking-tight">网页管理端</span>
</a>
</div>
</div>
<p class="mt-10 text-center text-[10px] text-slate-300 font-medium">
            校园智慧食堂 · 网页监管端<br/>
            Security Compliance: ISO 27001
        </p>
</div>
<script src="api-helper.js"></script>
<script>
async function doLogin() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  if (!username || !password) { alert('请输入账号和密码'); return; }
  try {
    const res = await API.post('/auth/login', { username, password });
    if (res.code === 200) {
      API.setToken(res.data.token);
      API.setUser(res.data);
      window.location.href = 'logistics-index.html';
    } else {
      alert(res.message || '登录失败');
    }
  } catch (e) { alert('网络错误，请检查后端服务是否启动'); }
}
</script>
</body>
</html>
