<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"/><title>员工管理 V3</title></head>
<body>
<h1>员工管理</h1>
<div id="msg" style="color:blue;font-size:20px;"></div>
<table border="1" cellpadding="8" cellspacing="0">
<thead><tr><th>ID</th><th>工号</th><th>姓名</th><th>岗位</th><th>状态</th></tr></thead>
<tbody id="tb"></tbody>
</table>
<br>
<h2>入职办理</h2>
<input id="inpName" placeholder="姓名">
<input id="inpPos" placeholder="岗位">
<button onclick="add()">确认入职</button>
<div id="result"></div>

<script src="/api/employees/js"></script>
<script>
var msg=document.getElementById('msg');
msg.textContent='EMP_DATA 类型: '+(typeof EMP_DATA)+' 长度: '+(typeof EMP_DATA!=='undefined'?EMP_DATA.length:'UNDEFINED');

// 渲染员工列表
(function(){
  var tb=document.getElementById('tb');
  if(!tb)return;
  var list=typeof EMP_DATA!=='undefined'?EMP_DATA:[];
  var h='';
  for(var i=0;i<list.length;i++){
    var e=list[i];
    h+='<tr><td>'+e.id+'</td><td>'+e.empNo+'</td><td>'+e.name+'</td><td>'+e.position+'</td><td>'+e.status+'</td></tr>';
  }
  tb.innerHTML=h||'<tr><td colspan="5">无数据</td></tr>';
})();

// 入职
function add(){
  var name=document.getElementById('inpName').value;
  var pos=document.getElementById('inpPos').value;
  if(!name){alert('请输入姓名');return;}
  var token=sessionStorage.getItem('token')||'';
  var h={'Content-Type':'application/json'};
  if(token)h['Authorization']='Bearer '+token;
  var data={name:name,position:pos,empNo:'EMP-'+new Date().getFullYear()+'-'+Math.floor(Math.random()*900+100),status:'ACTIVE'};
  document.getElementById('result').textContent='提交中...';
  fetch('http://localhost:8080/api/employees',{method:'POST',headers:h,body:JSON.stringify(data)})
  .then(function(r){return r.json();})
  .then(function(r){
    document.getElementById('result').textContent=r.code===200?'入职成功 ID='+r.data.id:'失败: '+r.message;
  }).catch(function(e){
    document.getElementById('result').textContent='网络错误: '+e.message;
  });
}
</script>
</body>
</html>
